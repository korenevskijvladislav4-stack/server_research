server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: research-crm-pm2
    static_configs:
      - targets:
          - localhost
        labels:
          job: research-crm
          service: research-crm-api
          __path__: /var/log/pm2/*.log
    pipeline_stages:
      - regex:
          expression: "^(?:(?P<pm2_time>\\d{4}-\\d{2}-\\d{2}[^\\{]*) )?(?P<line>.*)$"
      - json:
          source: line
          expressions:
            level: level
            msg: msg
            method: method
            path: path
            statusCode: statusCode
            durationMs: durationMs
            requestId: requestId
      - labels:
          level:
          method:
          statusCode:
      - output:
          source: line
